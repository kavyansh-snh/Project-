<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - LeetCode Clone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
  <!-- ===================== NAVBAR ===================== -->
  <header class="navbar">
    <!-- Add LeetCode-style logo image here (recommended size: ~35px height) -->
    <!-- <img src="images/logo.png" alt="Logo" class="logo-img"> -->
    <h1 class="logo-text">Leet<span>Code</span></h1>
  </header>
 
  <!-- ===================== LOGIN CARD ===================== -->
  <main class="login-wrapper">
    <div class="login-card">
 
      <h2 class="login-title">Sign In</h2>
 
      <form class="login-form">
        <label for="username">Username or E-mail</label>
        <input type="text" id="username" placeholder="Username or E-mail" required>
 
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password" required>
 
        <a href="#" class="forgot-link">Forgot Password?</a>
 
        <button type="submit" class="btn-login">Log In</button>
      </form>
 
      <p class="signup-text">Don't have an account? <a href="#">Sign up</a></p>
 
      <!-- ===================== DIVIDER ===================== -->
      <div class="divider">
        <span>or</span>
      </div>
 
      <!-- ===================== SOCIAL LOGIN BUTTONS ===================== -->
      <!-- Add small platform icons here for each button (recommended size: ~20x20px) -->
      <div class="social-login">
        <button class="btn-social">
          <!-- <img src="images/google-icon.png" alt="Google"> -->
          Continue with Google
        </button>
        <button class="btn-social">
          <!-- <img src="images/github-icon.png" alt="GitHub"> -->
          Continue with GitHub
        </button>
        <button class="btn-social">
          <!-- <img src="images/facebook-icon.png" alt="Facebook"> -->
          Continue with Facebook
        </button>
      </div>
 
    </div>
  </main>
 
  <!-- ===================== FOOTER ===================== -->
  <footer class="footer">
    <p>&copy; 2026 LeetCode Clone - College Project</p>
  </footer>
  <link rel="stylesheet" href="letcode.css">
 
</body>
</html>
